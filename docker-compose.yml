services:
  # The Gateway (Router)
  nginx:
    image: nginx:stable-alpine
    ports:
      - "8080:80"
    volumes:
      - ./:/var/www/html
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    networks:
      - messbook-network
    depends_on:
      - member-service
      - owner-service
      - admin-service

  # Service for Mess Members
  member-service:
    build: .
    volumes:
      - ./:/var/www/html
    environment:
      - DB_HOST=db
      - SERVICE_ROLE=member
    networks:
      - messbook-network

  # Service for Mess Owners
  owner-service:
    build: .
    volumes:
      - ./:/var/www/html
    environment:
      - DB_HOST=db
      - SERVICE_ROLE=owner
    networks:
      - messbook-network

  # Service for System Admin
  admin-service:
    build: .
    volumes:
      - ./:/var/www/html
    environment:
      - DB_HOST=db
      - SERVICE_ROLE=admin
    networks:
      - messbook-network

  # Phase 3: The SOA Billing Microservice (Python/Flask)
  billing-service:
    build: ./billing-service
    
    ports:
      - "5000:5000"
    networks:
      - messbook-network
    depends_on:
      - db

  # Phase 4: The Cloud Dashboard
  portainer:
    image: portainer/portainer-ce:latest
    ports:
      - "9443:9443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer_data:/data
    networks:
      - messbook-network

  # Database Service
  db:
    image: mysql:8.0
    container_name: messbook-db-1
    environment:
      MYSQL_DATABASE: messbook_db
      MYSQL_ROOT_PASSWORD: root
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - messbook-network

volumes:
  db_data:
  portainer_data:

networks:
  messbook-network:
    driver: bridge
