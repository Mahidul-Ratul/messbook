server {
    listen 80;
    index index.php index.html;
    root /var/www/html/public;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # Handle all PHP requests
    location ~ \.php$ {
        # Using the exact service name from your 'docker-compose ps'
        fastcgi_pass member-service:9000; 
        fastcgi_index index.php;
        include fastcgi_params;
        # Crucial: This tells PHP exactly where the file is inside its own container
        fastcgi_param SCRIPT_FILENAME /var/www/html/public$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
    }

    location /api/billing/ {
        proxy_pass http://billing-service:5000/;
        proxy_set_header Host $host;
    }
}